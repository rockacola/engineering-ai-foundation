version: 1.0.0

rules:
  - id: preserve_existing_data
    description: Never delete or overwrite existing files without archiving first
    enforcement: blocking

  - id: map_to_new_structure
    description: All existing content must be explicitly mapped to the target structure before migration begins
    enforcement: blocking

  - id: never_delete_without_archive
    description: Files to be removed must be moved to .ai/archive/ preserving their original relative path
    enforcement: blocking

  - id: generate_migration_report
    description: A migration-report.md must be generated at repo root documenting every file moved, renamed, or deleted
    enforcement: blocking

  - id: require_human_approval
    description: Human must explicitly approve the mapping plan before any destructive changes are applied
    enforcement: blocking

  - id: validate_after_migration
    description: Run audit-project after migration completes; include results in migration report
    enforcement: recommended

  - id: preserve_git_history
    description: Use git mv for file moves to preserve history where possible
    enforcement: recommended

  - id: no_content_invention
    description: Migration must move and map existing content only; AI must not generate new content during migration
    enforcement: blocking

archive:
  path: .ai/archive/
  naming: '{original_path_with_slashes_as_dashes}_{YYYYMMDDTHHmmssZ}'
  report_file: migration-report.md
  report_sections:
    - Summary
    - Files Moved
    - Files Archived
    - Files Created
    - Validation Results
    - Pending Human Decisions
